<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FUOYE Complaints Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="animations.css">
</head>
<body class="light-theme">
    <div class="auth-container">
        <div class="auth-background">
            <div class="auth-shape shape-1"></div>
            <div class="auth-shape shape-2"></div>
        </div>

        <div class="auth-wrapper">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="auth-logo">
                        <i class="fas fa-comment-dots"></i>
                    </div>
                    <h1 class="auth-title">Welcome Back</h1>
                    <p class="auth-subtitle">Sign in to your FUOYE Portal account</p>
                </div>

                <form class="auth-form" id="loginForm">
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input 
                            type="email" 
                            id="email" 
                            placeholder="you@fuoye.edu.ng" 
                            required
                        >
                        <div class="form-error" id="emailError"></div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="password-input-wrapper">
                            <input 
                                type="password" 
                                id="password" 
                                placeholder="Enter your password" 
                                required
                            >
                            <button type="button" class="password-toggle" onclick="togglePassword()">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div class="form-error" id="passwordError"></div>
                    </div>

                    <div class="form-checkbox">
                        <input type="checkbox" id="rememberMe">
                        <label for="rememberMe">Remember me</label>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">
                        <i class="fas fa-sign-in-alt"></i> Sign In
                    </button>
                </form>

                <div class="form-divider">or continue with</div>

                <div class="social-login">
                    <button type="button" class="social-btn">
                        <i class="fab fa-google"></i>
                        Google
                    </button>
                    <button type="button" class="social-btn">
                        <i class="fab fa-microsoft"></i>
                        Microsoft
                    </button>
                </div>

                <div class="form-link">
                    <a href="forgot-password.html">Forgot your password?</a>
                </div>

                <div class="auth-switch">
                    Don't have an account? <a href="register.html">Sign up here</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Demo Accounts Alert -->
    <div style="position: fixed; bottom: 20px; right: 20px; background: rgba(99, 102, 241, 0.9); color: white; padding: 15px 20px; border-radius: 8px; font-size: 0.9rem; max-width: 250px;">
        <strong>Demo Accounts:</strong><br>
        Student: student@fuoye.edu.ng<br>
        Officer: officer@fuoye.edu.ng<br>
        Admin: admin@fuoye.edu.ng<br>
        Password: password
    </div>

    <script src="main.js"></script>
    <script>
        function togglePassword() {
            const input = document.getElementById('password');
            const icon = event.target.closest('.password-toggle').querySelector('i');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Validate
            const errors = FormValidator.validateForm(
                { email, password },
                {
                    email: { required: true, email: true },
                    password: { required: true, minLength: 6 }
                }
            );

            if (errors) {
                Object.keys(errors).forEach(field => {
                    const errorEl = document.getElementById(`${field}Error`);
                    if (errorEl) {
                        errorEl.textContent = errors[field][0];
                    }
                });
                return;
            }

            // Login
            const result = window.authManager.login(email, password);
            
            if (result.success) {
                window.notificationManager.createNotification(
                    result.user.id,
                    { message: 'Login successful!', type: 'success' }
                );
                
                // Redirect based on role
                const dashboardMap = {
                    'student': 'student-dashboard.html',
                    'officer': 'officer-dashboard.html',
                    'admin': 'admin-dashboard.html',
                    'super-admin': 'admin-dashboard.html'
                };
                
                setTimeout(() => {
                    window.location.href = dashboardMap[result.user.role];
                }, 500);
            } else {
                window.notificationManager.createNotification(
                    null,
                    { message: result.message, type: 'error' }
                );
            }
        });

        // Initialize demo data if needed
        function initializeDemoData() {
            const existingUsers = JSON.parse(localStorage.getItem('users') || '[]');
            if (existingUsers.length === 0) {
                const demoUsers = [
                    {
                        id: 1,
                        firstName: 'John',
                        lastName: 'Doe',
                        email: 'student@fuoye.edu.ng',
                        phone: '+2348012345678',
                        matrixNumber: 'CSC/2023/0001',
                        role: 'student',
                        department: 'Computer Science',
                        password: btoa('password'),
                        createdAt: new Date().toISOString(),
                        complaints: [],
                        notifications: []
                    },
                    {
                        id: 2,
                        firstName: 'Jane',
                        lastName: 'Smith',
                        email: 'officer@fuoye.edu.ng',
                        phone: '+2348012345679',
                        role: 'officer',
                        department: 'Computer Science',
                        password: btoa('password'),
                        createdAt: new Date().toISOString(),
                        complaints: [],
                        notifications: []
                    },
                    {
                        id: 3,
                        firstName: 'Admin',
                        lastName: 'User',
                        email: 'admin@fuoye.edu.ng',
                        phone: '+2348012345680',
                        role: 'admin',
                        department: 'Administration',
                        password: btoa('password'),
                        createdAt: new Date().toISOString(),
                        complaints: [],
                        notifications: []
                    }
                ];

                localStorage.setItem('users', JSON.stringify(demoUsers));
            }
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', initializeDemoData);
    </script>
</body>
</html>
